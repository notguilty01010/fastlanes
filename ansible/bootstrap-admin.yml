---
# Одноразовый бутстрап первого админа.
# Идемпотентен: если в БД уже есть admin - no-op.
#
# Запускается:
#   - через workflow_dispatch у GitHub Actions (`.github/workflows/bootstrap-admin.yml`),
#   - либо локально: `ansible-playbook -i inventory.ini bootstrap-admin.yml --vault-password-file ...`
#
# Использует уже выложенный релиз (current/) - там есть seed.mjs и node_modules
# с @prisma/client и bcryptjs.

- name: Bootstrap initial admin
  hosts: fastlanes
  gather_facts: false
  remote_user: deploy

  tasks:
    - name: Run seed against current release
      ansible.builtin.command:
        cmd: /usr/bin/node prisma/seed.mjs
        chdir: "{{ app_dir }}/current"
      environment:
        DATABASE_URL: "file:{{ app_dir }}/fastlanes.db"
        ADMIN_INITIAL_EMAIL: "{{ admin_initial_email }}"
        ADMIN_INITIAL_PASSWORD: "{{ admin_initial_password }}"
        ADMIN_INITIAL_NAME: "{{ admin_initial_name }}"
      register: seed_out
      changed_when: "'Created admin' in seed_out.stdout"

    - name: Show seed output
      ansible.builtin.debug:
        var: seed_out.stdout_lines
