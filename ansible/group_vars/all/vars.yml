---
# Несекретные параметры. Секреты — в vault.yml (зашифрованы ansible-vault).

domain: fastlanes.pp.ua
letsencrypt_email: admin@fastlanes.pp.ua

nodejs_major: "20"

app_dir: /var/www/fastlanes
app_user: deploy
app_repo: "https://github.com/notguilty01010/fastlanes.git"

service_name: fastlanes

# Эти переменные приходят из vault.yml:
#   vault_auth_secret

auth_secret: "{{ vault_auth_secret }}"
