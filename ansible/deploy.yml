---
# Деплой готового артефакта (собран в CI). На сервере НЕ собираем и НЕ держим
# devDependencies - едет только standalone-бандл Next.js + node_modules только
# с runtime-зависимостями.
#
# Схема Capistrano-style:
#   {{ app_dir }}/
#     fastlanes.db            # БД, переживает релизы
#     current -> releases/<tag>
#     releases/
#       <tag>/                # распакованный standalone-бандл
#         server.js
#         node_modules/
#         prisma/{schema.prisma, migrations/}
#         .env                # отрендерен из vault
#
# Параметры (передаются через -e):
#   artifact_path   - путь к tar.gz на runner'е CI
#   release_tag     - уникальный идентификатор релиза (e.g. 20260508-abc1234)
#   prisma_version  - версия prisma CLI для `npx prisma@x migrate deploy`

- name: Deploy FastLanes
  hosts: fastlanes
  gather_facts: false
  remote_user: deploy

  vars:
    releases_dir: "{{ app_dir }}/releases"
    release_dir: "{{ releases_dir }}/{{ release_tag }}"
    current_link: "{{ app_dir }}/current"
    keep_releases: 3

  tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - artifact_path is defined
          - release_tag is defined
          - prisma_version is defined
        fail_msg: "Передай artifact_path, release_tag и prisma_version через -e"

    - name: Ensure app_dir exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure releases dir exists
      ansible.builtin.file:
        path: "{{ releases_dir }}"
        state: directory
        mode: "0755"

    - name: Create release dir
      ansible.builtin.file:
        path: "{{ release_dir }}"
        state: directory
        mode: "0755"

    - name: Upload + unpack artifact
      ansible.builtin.unarchive:
        src: "{{ artifact_path }}"
        dest: "{{ release_dir }}"
        remote_src: false

    - name: Render release .env
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ release_dir }}/.env"
        mode: "0600"

    - name: prisma migrate deploy
      ansible.builtin.command:
        cmd: "npx --yes prisma@{{ prisma_version }} migrate deploy"
        chdir: "{{ release_dir }}"
      environment:
        DATABASE_URL: "file:{{ app_dir }}/fastlanes.db"
      changed_when: true

    - name: Switch current symlink
      ansible.builtin.file:
        src: "{{ release_dir }}"
        dest: "{{ current_link }}"
        state: link
        force: true

    - name: Restart fastlanes service
      ansible.builtin.command: sudo /bin/systemctl restart {{ service_name }}
      changed_when: true

    # TLS не трогаем здесь: первичный выпуск делает provision.yml,
    # автоматическое продление - системный certbot.timer (ставится apt-пакетом).

    - name: Wait for /api/health
      ansible.builtin.uri:
        url: "https://{{ domain }}/api/health"
        status_code: 200
        return_content: true
      register: health
      retries: 30
      delay: 2
      until: health.status == 200
      delegate_to: localhost
      become: false

    - name: Show health response
      ansible.builtin.debug:
        var: health.json

    - name: List all releases
      ansible.builtin.find:
        paths: "{{ releases_dir }}"
        file_type: directory
      register: all_releases

    - name: Prune old releases (keep last {{ keep_releases }})
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ (all_releases.files | sort(attribute='mtime', reverse=true))[keep_releases:] }}"
      when: all_releases.files | length > keep_releases
      loop_control:
        label: "{{ item.path | basename }}"
