---
# Раскатка приложения. Запускается из CI на push в main.
# Подключаемся под deploy-юзером (provision его уже создал).

- name: Deploy FastLanes
  hosts: fastlanes
  gather_facts: false
  remote_user: deploy

  tasks:
    - name: Ensure app dir is a git repo
      ansible.builtin.stat:
        path: "{{ app_dir }}/.git"
      register: app_git

    - name: Fail if provision wasn't run
      ansible.builtin.fail:
        msg: "{{ app_dir }} не клонирован — запусти provision.yml"
      when: not app_git.stat.exists

    - name: Pull latest main
      ansible.builtin.git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: main
        depth: 1
        force: true
        update: true

    - name: Re-render .env (на случай ротации секретов)
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        mode: "0600"

    - name: npm ci
      ansible.builtin.command:
        cmd: npm ci --no-audit --no-fund
        chdir: "{{ app_dir }}"
      environment:
        NODE_ENV: production
      changed_when: true

    - name: prisma migrate deploy
      ansible.builtin.command:
        cmd: npx prisma migrate deploy
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: next build
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ app_dir }}"
      environment:
        NODE_ENV: production
      changed_when: true

    - name: Restart fastlanes service
      ansible.builtin.command: sudo /bin/systemctl restart {{ service_name }}
      changed_when: true

    - name: Wait for /api/health
      ansible.builtin.uri:
        url: "https://{{ domain }}/api/health"
        status_code: 200
        return_content: true
      register: health
      retries: 30
      delay: 2
      until: health.status == 200
      delegate_to: localhost
      become: false

    - name: Show health response
      ansible.builtin.debug:
        var: health.json
